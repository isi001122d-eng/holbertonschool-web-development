<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS - Get Schooled</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="#" alt="icon" class="logo-icon">
            <span class="logo-text">SchoolBrand</span>
        </div>
        <nav class="nav">
            <a href="#" class="nav-link">COURSES</a>
            <a href="#" class="nav-link">PRICING</a>
            <a href="#" class="nav-link">LOGIN</a>
        </nav>
    </header>
    <main>
        <section class="hero-section">
            <h1 class="hero-title">Get schooled</h1>
            <div class="keywords-row">
                <span>SMILES</span>
                <span>GRIN</span>
                <span>LAUGH</span>
            </div>
            <button class="cta-button">REGISTER FOR FREE</button>
            <h2 class="section-subtitle"><span class="purple-text">Learn</span> from the pros</h2>
            <div class="profiles-container">
                <div class="profile-card">
                    <img src="#" alt="Profile 1" class="profile-img">
                    <h3 class="profile-name">Instructor 1</h3>
                    <p class="profile-desc">Expert in Design</p>
                </div>
                <div class="profile-card">
                    <img src="#" alt="Profile 2" class="profile-img">
                    <h3 class="profile-name">Instructor 2</h3>
                    <p class="profile-desc">Expert in Frontend</p>
                </div>
                <div class="profile-card">
                    <img src="#" alt="Profile 3" class="profile-img">
                    <h3 class="profile-name">Instructor 3</h3>
                    <p class="profile-desc">Expert in Backend</p>
                </div>
                <div class="profile-card">
                    <img src="#" alt="Profile 4" class="profile-img">
                    <h3 class="profile-name">Instructor 4</h3>
                    <p class="profile-desc">Expert in Systems</p>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
